<div class="mx-auto" appObserveSection>
  <app-navbar></app-navbar>
  <section class="mt-[3.2rem] section">
    <app-container>
      <div class="flex md:flex-col justify-between items-center">
        <div
          class="flex flex-col md:items-center md:mb-[4rem] max-w-[54rem] md:max-w-[70vw] lg:w-[46rem] gap-[2rem]"
        >
          <app-primary-heading
            [title]="'We are creating wealth for our'"
            [highlightedText]="'society'"
          ></app-primary-heading>
          <app-primary-paragraph
            [text]="
              'Revent is dedicated to enabling financial freedom by providing quick access to loans in order to provide convenience for its customers.'
            "
          ></app-primary-paragraph>
          <app-button [text]="'Lets Talk 👋🏾'"></app-button>
        </div>
        <div>
          <app-section-image
            [imageUrl]="'../../../../assets/images/hero-img.svg'"
          ></app-section-image>
        </div>
      </div>
    </app-container>
  </section>
  <section class="section">
    <app-container>
      <div class="flex md:flex-col-reverse justify-between items-center">
        <div class="w-full lg:flex lg:flex-col lg:items-center">
          <div class="flex flex-col lg:items-center max-w-[56rem] gap-[2rem]">
            <app-secondary-heading
              [title]="'Are you looking for a quick loan? Get your loan in'"
              [highlightedText]="'24 hours ⏳'"
            ></app-secondary-heading>
          </div>
          <div
            class="w-full flex lg:flex-col-reverse justify-between items-center"
          >
            <div class="flex gap-[2rem] max-w-[54rem]">
              <div class="flex flex-col max-w-[52rem] md:px-[5vw] gap-[2rem]">
                <app-step
                  *ngFor="let step of steps"
                  [headingText]="step.headingText"
                  [paragraphText]="step.paragraphText"
                ></app-step>
              </div>
            </div>
            <app-section-image
              [imageUrl]="'../../../../assets/images/section1.svg'"
            ></app-section-image>
          </div>
        </div>
      </div>
    </app-container>
  </section>
  <section class="section">
    <div class="bg-gradient-to-b from-t-grad-col-1 to-t-grad-col-2">
      <app-container>
        <div class="flex lg:flex-col-reverse justify-between items-center">
          <div
            class="max-w-[50rem] grid grid-cols-2 sm:grid-cols-1 sm:mb-[5rem] gap-[2rem]"
          >
            <app-feature-card
              *ngFor="let feature of features"
              [feature]="feature"
            ></app-feature-card>
          </div>

          <div class="max-w-[50rem]">
            <app-section-block [block]="guaranteeBlock"></app-section-block>
          </div>
        </div>
      </app-container>
    </div>
  </section>
  <section class="section">
    <app-achievements-banner
      [achievements]="achievements"
    ></app-achievements-banner>
  </section>
  <section class="section">
    <app-container>
      <div class="flex justify-between md:flex-col items-center">
        <div class="w-full flex flex-col gap-[5rem]">
          <div
            class="w-full flex items-center md:flex-col-reverse md:px-[5vw] justify-between"
          >
            <div class="max-w-[50rem]">
              <app-section-block [block]="sectionBlocks[0]"></app-section-block>
            </div>
            <app-section-image
              [imageUrl]="'../../../../assets/images/career-man.svg'"
            ></app-section-image>
          </div>
          <div
            class="w-full flex items-center md:flex-col md:px-[5vw] justify-between gap-[8rem]"
          >
            <app-section-image
              [imageUrl]="'../../../../assets/images/corporate-woman.svg'"
            ></app-section-image>
            <div class="max-w-[50rem]">
              <app-section-block [block]="sectionBlocks[1]"></app-section-block>
            </div>
          </div>
          <div
            class="w-full flex items-center md:flex-col-reverse md:px-[5vw] justify-between"
          >
            <div class="max-w-[50rem]">
              <app-section-block [block]="sectionBlocks[2]"></app-section-block>
            </div>
            <app-section-image
              [imageUrl]="'../../../../assets/images/consulting.svg'"
            ></app-section-image>
          </div>
        </div>
      </div>
    </app-container>
  </section>
  <section class="section">
    <div
      class="max-w-full px-[7%] mx-auto py-[5%] md:flex-col-reverse bg-t-blue-2 flex justify-between items-center"
    >
      <div class="max-w-[50rem]">
        <app-testimonial
          [testimonialText]="
            'I used to struggle with my business due to low capital until i met Revent that took my business to a new level with the loan granted to me at the best rates ever'
          "
          [testifierName]="'- Magarette Chikamso'"
          [testimonialTitle]="'Stories from users'"
        ></app-testimonial>
      </div>
      <div class="max-w-[50rem] md:mt-[5rem]">
        <app-section-image
          [imageUrl]="'../../../../assets/images/testifier.svg'"
        ></app-section-image>
      </div>
    </div>
  </section>
  <section class="section">
    <app-partners></app-partners>
  </section>
  <section class="section">
    <app-container>
      <div class="flex justify-between items-center">
        <div class="w-full mt-[2.4rem] flex justify-center">
          <div
            class="max-w-[60rem] flex flex-col gap-[2rem] text-center items-center"
          >
            <app-secondary-heading
              [title]="'Latest News'"
              [centered]="true"
            ></app-secondary-heading>
            <app-primary-paragraph
              [text]="
                'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Commodo sodales elit quam nisl, amet. '
              "
            ></app-primary-paragraph>
            <div
              class="mt-[7.2rem] flex lg:flex-col text-start justify-between gap-[3rem]"
            >
              <app-blog-card
                *ngFor="let blogItem of blogItems"
                [headingText]="blogItem.headingText"
                [imageUrl]="blogItem.imageUrl"
                [paragraphText]="blogItem.paragraphText"
              ></app-blog-card>
            </div>
          </div>
        </div>
      </div>
    </app-container>
  </section>
  <section class="section">
    <app-subscribe></app-subscribe>
  </section>
  <section class="section">
    <app-container>
      <div class="flex justify-between items-center">
        <div class="w-full my-[2.4rem] pb-[5%] flex justify-center">
          <div class="max-w-[80rem] flex flex-col gap-[4rem] items-center">
            <app-secondary-heading
              [title]="
                'We are here to help you navigate the poor financial service provision in Africa'
              "
              [centered]="true"
              [weight]="'regular'"
            ></app-secondary-heading>
            <app-button
              [buttonColor]="'bg-t-yellow-1'"
              [text]="'Lets Talk 👋🏾'"
            ></app-button>
          </div>
        </div>
      </div>
    </app-container>
  </section>
  <app-footer></app-footer>
</div>
