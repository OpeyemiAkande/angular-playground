<div class="{{ centered ? 'text-center' : 'text-start' }}">
  <h1
    class="text-[4rem] leading-[5rem] lg:text-center sm:text-[2.8rem] sm:leading-[3.5rem]"
    [ngClass]="[
      getTextColor(),
      weight === 'regular' ? 'font-headline-2' : 'font-headline-1'
    ]"
  >
    {{ title }}
    <span *ngIf="highlightedText" class="text-t-blue-1">{{
      highlightedText
    }}</span>
  </h1>
</div>
