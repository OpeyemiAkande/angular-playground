<div
  class="dropdown-checkbox-item"
  [class.dropdown-item-disabled]="disabled"
  [attr.role]="disabled ? null : 'menuitemcheckbox'"
  [attr.tabindex]="disabled ? -1 : 0"
  [attr.aria-checked]="checked"
  (click)="toggle()"
  (keydown)="onKeydown($event)"
>
  <span class="dropdown-checkbox-indicator">
    <svg
      *ngIf="checked"
      class="size-4"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M5 13l4 4L19 7"
      ></path>
    </svg>
  </span>
  <ng-content></ng-content>
</div>
