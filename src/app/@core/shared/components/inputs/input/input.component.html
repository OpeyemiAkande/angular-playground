<div class="form-control w-full mb-[1.4rem]">
  <label class="w-full text-[1.4rem] mb-[5px] text-gray-400" [for]="inputId">{{
    label
  }}</label>
  <input
    class="w-full text-[1.4rem] outline-none text-inherit p-[1.2rem] border-solid border border-gray-200 rounded-[.35rem] h-[3.6rem]"
    [formControl]="control"
    [id]="inputId"
    [placeholder]="placeholder"
    [type]="type ? type : 'text'"
    appNoScrollInput
  />

  <div *ngIf="control.errors && control.touched">
    <div>
      <app-error [errorMessage]="errorMessage(control.errors)"></app-error>
    </div>
  </div>
</div>
