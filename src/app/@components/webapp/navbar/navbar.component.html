<header
  class="border-b-[0.5px] font-poppins font-normal border-solid border-gray-200"
>
  <nav class="py-[1.2rem] px-[1.6rem] flex justify-between items-center">
    <div class="w-full flex items-center">
      <div class="hidden mt-2 lg:block" (click)="toggleSidebar()">
        <mat-icon>
          <span class="material-symbols-outlined"> menu </span>
        </mat-icon>
      </div>
      <div class="sm:hidden">
        <app-navbar-breadcrumb></app-navbar-breadcrumb>
      </div>
    </div>
    <div class="flex items-center gap-5 min-w-[18rem] sm:min-w-[auto]">
      <div class="sm:hidden block">
        <p class="font-semibold text-black">{{ userFullName }}</p>
        <p>{{ role | capitalizeFirst }}</p>
      </div>

      <div class="w-[3.4rem] h-[3.4rem] rounded-full overflow-hidden">
        <img
          class="w-full h-full object-cover"
          src="../../../../assets/images/profile-picture-5.jpg"
          alt=""
        />
      </div>

      <div class="">
        <img src="../../../../assets/images/icons/arrow-down.svg" alt="" />
      </div>
    </div>
  </nav>
</header>
