<div
  class="max-w-full px-[7%] mx-auto py-[5%] bg-t-blue-2 flex sm:flex-col sm:gap-[5rem] justify-between items-center"
>
  <div *ngFor="let partner of partners">
    <img
      class="max-h-full lg:max-h-[5rem] md:max-h-[3rem]"
      src="{{ partner.imageUrl }}"
      alt="{{ partner.desc }}"
    />
  </div>
</div>
