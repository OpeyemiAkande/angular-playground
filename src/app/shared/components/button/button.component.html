<button
  class="px-[3.6rem] md:px-[3rem] py-[1.2rem] md:py-[1rem] font-body-1 text-[1.8rem] font-semibold"
  [ngClass]="[
    getButtonColor(),
    buttonType === 'icon'
      ? 'rounded-full text-t-blue-2'
      : 'rounded-[1rem] text-white'
  ]"
  [type]="getButtonType()"
>
  <span>{{ text }}</span>
</button>
