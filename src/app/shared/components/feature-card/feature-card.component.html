<div
  class="max-w-[27.8rem] min-h-[32rem] bg-white my-shadow rounded-[0.8rem] p-[1rem] flex flex-col items-start gap-[1rem]"
>
  <div class="my-[1.5rem]">
    <app-large-icon
      [iconUrl]="feature.imageUrl"
      [backgroundColor]="'bg-t-tint-1'"
    ></app-large-icon>
  </div>
  <h3 class="font-headline-2 text-[2.4rem] text-t-black-2">
    {{ feature.headingText }}
  </h3>
  <app-tertiary-paragraph
    [text]="feature.paragraphText"
  ></app-tertiary-paragraph>
</div>
